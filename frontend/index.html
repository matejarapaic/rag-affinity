<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affinity AI Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent-dim: #1f6feb;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --user-bg:  #1f6feb;
      --bot-bg:   #21262d;
      --danger:   #f85149;
      --success:  #3fb950;
      --tag-bg:   #0d1117;
      --radius:   10px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* Upload area */
    .upload-zone {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #upload-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }

    #upload-btn:hover { border-color: var(--accent); background: #1c2128; }

    #file-input { display: none; }

    #upload-status {
      font-size: 12px;
      color: var(--muted);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-ok  { color: var(--success) !important; }
    .status-err { color: var(--danger)  !important; }

    /* ── Messages ────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .msg-row.user  { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .avatar.bot  { background: var(--accent-dim); color: #fff; }
    .avatar.user { background: #2d333b; color: var(--muted); }

    .bubble-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 78%; }
    .msg-row.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    /* Markdown inside bot bubble */
    .bubble.bot p  { margin: 0 0 8px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot h1,.bubble.bot h2,.bubble.bot h3 { margin: 10px 0 6px; font-size: 1em; color: var(--accent); }
    .bubble.bot ul,.bubble.bot ol { margin: 6px 0 6px 18px; }
    .bubble.bot li { margin-bottom: 3px; }
    .bubble.bot code {
      background: #0d1117;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
    }
    .bubble.bot pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble.bot pre code { background: none; padding: 0; }
    .bubble.bot a { color: var(--accent); }
    .bubble.bot strong { color: #fff; }

    /* Sources */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }

    .source-tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted);
      cursor: default;
      transition: border-color 0.15s;
      position: relative;
    }

    .source-tag:hover { border-color: var(--accent); color: var(--accent); }

    /* Tooltip for chunk preview */
    .source-tag::after {
      content: attr(data-preview);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text);
      white-space: pre-wrap;
      max-width: 260px;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }

    .source-tag:hover::after { opacity: 1; }

    /* Typing indicator */
    .typing .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
      margin: 0 2px;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }

    /* ── Input bar ───────────────────────────────────────── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent-dim);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
      pointer-events: none;
    }

    #empty-state .big-icon { font-size: 40px; }
    #empty-state h2 { color: var(--text); font-size: 18px; }
    #empty-state p  { font-size: 13px; max-width: 320px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-icon">W</div>
      <div>
        <div class="brand-name">Affinity AI</div>
        <div class="brand-sub">Powered by Claude · RAG</div>
      </div>
    </div>
    <div class="upload-zone">
      <span id="upload-status">No document loaded</span>
      <button id="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
        </svg>
        Upload Document
      </button>
      <input type="file" id="file-input" accept=".pdf,.txt" />
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <div class="big-icon">💬</div>
      <h2>Ask Affinity AI</h2>
      <p>Upload a document and ask questions about it, or ask general finance questions from the knowledge base.</p>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Ask a question…"></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const API_BASE = "http://localhost:8000";

// ── State ───────────────────────────────────────────────────────────────────
let history = [];   // { role: "user"|"assistant", content: string }[]
let isBusy  = false;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById("messages");
const inputEl     = document.getElementById("user-input");
const sendBtn     = document.getElementById("send-btn");
const fileInput   = document.getElementById("file-input");
const uploadStatus= document.getElementById("upload-status");
const emptyState  = document.getElementById("empty-state");

// ── Helpers ──────────────────────────────────────────────────────────────────
function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideEmptyState() {
  if (emptyState) emptyState.style.display = "none";
}

function setInputBusy(busy) {
  isBusy = busy;
  sendBtn.disabled = busy;
  inputEl.disabled = busy;
}

function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
}

// ── Render a message row ──────────────────────────────────────────────────────
function createBubble(role, html, sources = []) {
  hideEmptyState();

  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === "user" ? "U" : "W";

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;

  if (role === "bot") {
    bubble.innerHTML = html;  // already sanitised via marked
  } else {
    bubble.textContent = html; // user text is raw
  }

  wrap.appendChild(bubble);

  if (sources && sources.length > 0) {
    const sourcesEl = document.createElement("div");
    sourcesEl.className = "sources";
    sources.forEach(s => {
      const tag = document.createElement("span");
      tag.className = "source-tag";
      tag.textContent = `📄 ${s.author_name}`;
      tag.setAttribute("data-preview", s.chunk_preview || "");
      tag.title = s.doc_id;
      sourcesEl.appendChild(tag);
    });
    wrap.appendChild(sourcesEl);
  }

  row.appendChild(avatar);
  row.appendChild(wrap);
  messagesEl.appendChild(row);
  scrollBottom();
  return { bubble, wrap };
}

// Typing indicator
function addTypingIndicator() {
  hideEmptyState();
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing-row";

  const avatar = document.createElement("div");
  avatar.className = "avatar bot";
  avatar.textContent = "W";

  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";

  const bubble = document.createElement("div");
  bubble.className = "bubble bot typing";
  bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

  wrap.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(wrap);
  messagesEl.appendChild(row);
  scrollBottom();
  return row;
}

function removeTypingIndicator() {
  const el = document.getElementById("typing-row");
  if (el) el.remove();
}

// ── Send message (streaming) ─────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isBusy) return;

  inputEl.value = "";
  autoResize();
  setInputBusy(true);

  // Render user bubble
  createBubble("user", text);

  // Add to history
  history.push({ role: "user", content: text });

  // Show typing indicator
  addTypingIndicator();

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: history.slice(0, -1), stream: true }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || "Request failed");
    }

    removeTypingIndicator();

    // Create bot bubble (empty for now)
    const { bubble, wrap } = createBubble("bot", "");
    let fullText = "";
    let sources  = [];

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Process SSE lines
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (line.startsWith("event: sources")) continue; // next data line has sources

        if (line.startsWith("data: ")) {
          const payload = line.slice(6);

          // Check for sources JSON (preceded by "event: sources")
          // We detect it by trying to parse as array
          if (payload.startsWith("[") || payload.startsWith("{")) {
            try {
              sources = JSON.parse(payload);
              // Render sources below bubble
              const sourcesEl = document.createElement("div");
              sourcesEl.className = "sources";
              sources.forEach(s => {
                const tag = document.createElement("span");
                tag.className = "source-tag";
                tag.textContent = `📄 ${s.author_name}`;
                tag.setAttribute("data-preview", s.chunk_preview || "");
                tag.title = s.doc_id;
                sourcesEl.appendChild(tag);
              });
              wrap.appendChild(sourcesEl);
              scrollBottom();
            } catch (_) { /* not JSON */ }
            continue;
          }

          if (payload === "[DONE]") break;
          if (payload.startsWith("[ERROR]")) {
            bubble.textContent = payload.replace("[ERROR] ", "");
            break;
          }

          // Unescape newlines
          const chunk = payload.replace(/\\n/g, "\n");
          fullText += chunk;
          bubble.innerHTML = marked.parse(fullText);
          scrollBottom();
        }
      }
    }

    // Save assistant message to history
    history.push({ role: "assistant", content: fullText });

  } catch (err) {
    removeTypingIndicator();
    createBubble("bot", `<span style="color:var(--danger)">Error: ${err.message}</span>`);
  } finally {
    setInputBusy(false);
    inputEl.focus();
  }
}

// ── Upload document ──────────────────────────────────────────────────────────
fileInput.addEventListener("change", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  const maxMB = 20;
  if (file.size > maxMB * 1024 * 1024) {
    uploadStatus.textContent = `File too large (max ${maxMB}MB)`;
    uploadStatus.className = "status-err";
    return;
  }

  uploadStatus.textContent = `Uploading ${file.name}…`;
  uploadStatus.className = "";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "Upload failed");
    }

    uploadStatus.textContent = `✓ ${file.name} · ${data.chunks_uploaded} chunks`;
    uploadStatus.className = "status-ok";

    // Notify in chat
    createBubble("bot",
      `<strong>Document uploaded successfully.</strong><br>` +
      `<code>${file.name}</code> was split into <strong>${data.chunks_uploaded} chunks</strong> ` +
      `and indexed. You can now ask questions about it.`
    );

  } catch (err) {
    uploadStatus.textContent = `Upload failed: ${err.message}`;
    uploadStatus.className = "status-err";
  } finally {
    fileInput.value = "";
  }
});

// ── Event listeners ──────────────────────────────────────────────────────────
sendBtn.addEventListener("click", sendMessage);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener("input", autoResize);

// ── Init ─────────────────────────────────────────────────────────────────────
inputEl.focus();
</script>
</body>
</html>
